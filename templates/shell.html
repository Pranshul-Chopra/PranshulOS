<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PranshulOS</title>
  <link rel="stylesheet" href="/static/fonts/ibmflex.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #0c0c0c;
      --surface:     #141414;
      --surface2:    #1c1c1c;
      --border:      #272727;
      --border2:     #333;
      --text:        #e8e6e1;
      --text2:       #8a8880;
      --text3:       #4a4845;
      --amber:       #e8a84c;
      --amber-dim:   #7a5820;
      --amber-faint: rgba(232,168,76,0.07);
      --amber-faint2:rgba(232,168,76,0.14);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--sans); -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── App shell: sidebar + main ── */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 180px;
      flex-shrink: 0;
      background: #0e0e0e;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .sb-logo {
      padding: 22px 18px 16px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--amber);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sb-nav {
      padding: 14px 10px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .sb-section {
      padding: 14px 8px 5px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.07em;
      color: var(--text3);
      text-transform: uppercase;
    }
    .sb-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: var(--sans);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.3;
    }
    .sb-btn:hover { background: var(--surface2); color: var(--text); }
    .sb-btn.active { background: var(--surface2); color: var(--amber); }
    .sb-btn .sb-icon { font-size: 15px; flex-shrink: 0; opacity: 0.7; }
    .sb-btn.active .sb-icon { opacity: 1; }
    .sb-ver {
      padding: 12px 18px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text3);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    /* ── Main content area ── */
    .main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #content {
      flex: 1;
      overflow: auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #content > div {
      flex: 1;
      min-height: 0;
    }

    /* ── Page transition ── */
    .fade-in { animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sb-logo">PranshulOS</div>
    <nav class="sb-nav">
      <div class="sb-section">Pages</div>
      <button class="sb-btn" id="nav-home" onclick="navigate('home')">
        <span class="sb-icon">🏠</span> Home
      </button>
      <button class="sb-btn" id="nav-dashboard" onclick="navigate('dashboard')">
        <span class="sb-icon">📋</span> Dashboard
      </button>
      <button class="sb-btn" id="nav-docs" onclick="navigate('docs')">
        <span class="sb-icon">📝</span> Docs
      </button>
      <button class="sb-btn" id="nav-routine" onclick="navigate('routine')">
        <span class="sb-icon">🔁</span> Routine
      </button>
    </nav>
    <div class="sb-ver">v2.2 · pranshulos</div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div id="content"></div>
  </main>

</div>

<script>
// ── Navigation ──────────────────────────────────────────────────────────────
//
// Design: each page fragment exposes a single `window.__pageInit` function.
// shell.html calls it AFTER the DOM is appended, eliminating the rAF race and
// the stale-global problem (no guard flags survive across navigations because
// page scripts run fresh inside a Function scope every time).

let _currentPage = null;

async function navigate(page) {
  if (_currentPage === page) return;
  _currentPage = page;

  // Update sidebar active state
  document.querySelectorAll('.sb-btn[id^="nav-"]').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + page);
  if (navBtn) navBtn.classList.add('active');

  const content = document.getElementById('content');

  try {
    const res  = await fetch('/' + page + '?fragment=1');
    const html = await res.text();

    // ── 1. Teardown previous page ──────────────────────────────────────────
    if (typeof window.__pageDestroy === 'function') {
      try { window.__pageDestroy(); } catch(_) {}
    }
    window.__pageInit    = null;
    window.__pageDestroy = null;

    content.innerHTML = '';
    content.classList.remove('fade-in');

    // ── 2. Parse fragment ──────────────────────────────────────────────────
    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');

    // ── 3. Swap styles (removes previous page styles first) ────────────────
    document.querySelectorAll('style[data-page]').forEach(s => s.remove());
    doc.querySelectorAll('style').forEach(s => {
      const el = document.createElement('style');
      el.setAttribute('data-page', page);
      el.textContent = s.textContent;
      document.head.appendChild(el);
    });

    // ── 4. Mount DOM ───────────────────────────────────────────────────────
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'height:100%;display:flex;flex-direction:column;min-height:0;';
    doc.body.childNodes.forEach(node => {
      if (node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
        wrapper.appendChild(document.importNode(node, true));
      }
    });
    content.appendChild(wrapper);
    content.classList.add('fade-in');

    // ── 5. Execute scripts (DOM is already live at this point) ─────────────
    // Scripts run in order; they should set window.__pageInit instead of
    // calling init themselves. Shell calls __pageInit() below.
    const scriptTexts = [];
    doc.querySelectorAll('script').forEach(s => {
      if (s.src) {
        // external script — append normally (async, order not guaranteed)
        const el = document.createElement('script');
        el.src = s.src;
        document.head.appendChild(el);
      } else {
        scriptTexts.push(s.textContent);
      }
    });

    // Run inline scripts synchronously in order via Function so they share
    // no closure state with previous page loads.
    for (const src of scriptTexts) {
      try { new Function(src)(); } catch(e) { console.error('[navigate] script error on', page, e); }
    }

    // ── 6. Call the page's init hook now that DOM + scripts are both ready ─
    if (typeof window.__pageInit === 'function') {
      try { window.__pageInit(); } catch(e) { console.error('[navigate] __pageInit error on', page, e); }
    }

  } catch (e) {
    content.innerHTML =
      '<div style="padding:40px;font-family:monospace;color:#c87070;">Failed to load ' + page + ': ' + e.message + '</div>';
  }
}

// ── App launches ─────────────────────────────────────────────────────────────

async function launch(app) {
  try { await fetch('/launch/' + app); } catch(_) {}
}

// ── Init ─────────────────────────────────────────────────────────────────────

navigate('home');
</script>
</body>
</html>
